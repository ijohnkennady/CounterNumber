workflows:
  react-native-android:
    name: CounterNumbers Android Build
    max_build_duration: 60
    environment:
      node: 20.11.0        # ← change 18.19.0 to 20.11.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform android

      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - yasercs89@gmail.com        # ← change this to your email
        notify:
          success: true
          failure: true